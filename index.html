<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Gra w okręty - Edycja Taktyczna</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="main.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1 class="logo">BATTLESHIP</h1>
            
            <div class="stats-panel">
                <div class="stat-card">
                    <div class="stat-title">ODDANE STRZAŁY</div>
                    <div class="stat-value" id="stats-shots">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-title">ZATOPIONE STATKI</div>
                    <div class="stat-value" id="stats-sunk">0 / 3</div>
                </div>
                <div class="stat-card">
                    <div class="stat-title">SKUTECZNOŚĆ</div>
                    <div class="stat-value" id="stats-accuracy">0%</div>
                </div>
            </div>
        </header>

        <main class="game-area">
            <div class="board-wrapper">
                <div class="grid-labels col-labels">
                    <div>0</div><div>1</div><div>2</div><div>3</div><div>4</div><div>5</div><div>6</div>
                </div>
                <div class="grid-labels row-labels">
                    <div>A</div><div>B</div><div>C</div><div>D</div><div>E</div><div>F</div><div>G</div>
                </div>
                
                <div id="board" class="board">
                    <!-- Komórki wygenerowane przez JavaScript -->
                </div>
            </div>
            
            <div class="controls-container">
                <div class="terminal">
                    <div class="terminal-header">
                        <span class="dot red"></span>
                        <span class="dot yellow"></span>
                        <span class="dot green"></span>
                        <span class="terminal-title">KONTROLA OGNIA</span>
                    </div>
                    <div class="terminal-body">
                        <form id="retro-form" class="retro-form">
                            <label for="guessInput">Koordynaty uderzenia (opcjonalnie np. B3):</label>
                            <div class="input-group">
                                <input type="text" id="guessInput" placeholder="A0..." autocomplete="off" maxlength="2">
                                <button type="button" id="fireButton">OGNIA</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <!-- Element dynamicznego tooltipa -->
    <div id="floating-tooltip" class="tooltip">Trafienie!</div>

    <script src="battleship.js"></script>
</body>
</html>
